<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>English Words</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:700px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

input{
width:100%;
padding:10px;
font-size:18px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #ccc;
padding:10px;
}

th{
background:#eee;
}
</style>
</head>

<body>

<h1>English Dictionary</h1>

<input id="search" placeholder="Search...">

<table id="table">
<tr>
<th>English</th>
<th>Русский</th>
</tr>

<tr><td>Ability</td><td>Способность</td></tr>
<tr><td>Acquire</td><td>Приобретать</td></tr>
<tr><td>Accurate</td><td>Точный</td></tr>
<tr><td>Achieve</td><td>Достигать</td></tr>

</table>

<script>
const search=document.getElementById("search");

search.onkeyup=function(){
let filter=search.value.toLowerCase();
let rows=document.querySelectorAll("#table tr");

rows.forEach((row,index)=>{
if(index===0)return;

row.style.display=row.innerText.toLowerCase().includes(filter)
?"":"none";
});
}
</script>

</body>
  </html>
